<!doctype html>
<html>
<head>
<title> Switch Statement </title>
</head>
<body>
<script>
var fav_food = prompt("Enter your favourite food");
document.write("Favourite food entered :" + fav_food + "<br><br>");

switch (fav_food) {
  case "pizza":
    document.write("Pizza is 350 rupees <br>");
    break;
  case "pasta":
    document.write("Pasta is 80 rupees <br>");
    break;
  case "chowmein":
    document.write("Chowmein is 100 rupees <br>");
    break;
  default:
    document.write("Any other food is not available");
}
</script>
</body>
</html>
